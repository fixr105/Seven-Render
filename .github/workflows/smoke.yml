name: Post-Deploy Smoke Test

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Wait for deploy propagation
        run: sleep 90

      - name: Check app health (UI + API on Vercel)
        run: |
          APP_URL="${APP_URL:-https://seven-dashboard-seven.vercel.app}"
          APP_URL="${APP_URL%/}"
          echo "Checking frontend at $APP_URL"
          curl -sf -o /dev/null -w "%{http_code}" "$APP_URL" | grep -qE '^200|^30[0-9]' || (echo "Frontend check failed" && exit 1)
          echo "Checking API at $APP_URL/api/health"
          curl -sf "$APP_URL/api/health" | grep -q '"success":true' || (echo "API health check failed" && exit 1)
          PAN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$APP_URL/api/client/pan-lookup" -H "Content-Type: application/json" -d '{}')
          if [ "$PAN_STATUS" = "404" ]; then
            echo "ERROR: /api/client/pan-lookup returned 404"
            exit 1
          fi
          echo "pan-lookup OK (status $PAN_STATUS)"
        env:
          APP_URL: ${{ secrets.SMOKE_FRONTEND_URL }}
