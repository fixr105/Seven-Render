name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Deploy to Vercel (frontend + API)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      deployment-url: ${{ steps.vercel-deploy.outputs.deployment-url }}
      preview-url: ${{ steps.vercel-deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Verify API routes in source before deploy
        run: |
          grep -q "pan-lookup" backend/src/routes/client.routes.ts || exit 1
          grep -q "nbfcToolsRoutes" backend/src/routes/index.ts || exit 1
          grep -q "/nbfc/tools" backend/src/routes/index.ts || exit 1
          test -f api/index.js || exit 1
          echo "API entry and routes present in source"

      - name: Deploy to Vercel
        id: vercel-deploy
        run: |
          DEPLOY_URL=$(npx vercel@latest deploy --prod --yes --force --token "$VERCEL_TOKEN")
          echo "deployment-url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "preview-url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_FORCE_NO_BUILD_CACHE: '1'
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test same-origin API
        run: |
          # Prefer production alias — preview URLs may be behind Vercel Deployment Protection (302).
          FRONTEND_URL="${SMOKE_APP_URL:-https://seven-dashboard-seven.vercel.app}"
          FRONTEND_URL="${FRONTEND_URL%/}"
          echo "Waiting for deployment to settle..."
          sleep 25
          echo "Smoke testing $FRONTEND_URL/api/health"
          BODY=$(curl -sS "$FRONTEND_URL/api/health" || true)
          echo "Response: $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "Health check failed" && exit 1)
          PAN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$FRONTEND_URL/api/client/pan-lookup" -H "Content-Type: application/json" -d '{}')
          echo "pan-lookup status: $PAN_STATUS"
          if [ "$PAN_STATUS" = "404" ] || [ "$PAN_STATUS" = "500" ]; then
            echo "ERROR: /api/client/pan-lookup returned $PAN_STATUS"
            curl -sS -X POST "$FRONTEND_URL/api/client/pan-lookup" -H "Content-Type: application/json" -d '{}' || true
            exit 1
          fi
          echo "All smoke tests passed."
        env:
          SMOKE_APP_URL: ${{ secrets.SMOKE_FRONTEND_URL }}

  deploy-summary:
    name: Deploy Summary - Test Links
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: always() && needs.deploy-frontend.result == 'success'
    steps:
      - name: Post deploy test links
        run: |
          FRONTEND_URL="${{ needs.deploy-frontend.outputs.deployment-url || needs.deploy-frontend.outputs.preview-url }}"
          if [ -z "$FRONTEND_URL" ]; then
            FRONTEND_URL="https://seven-dashboard-seven.vercel.app"
          fi
          echo "## Test links (deploy complete)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **App (UI + API)** | $FRONTEND_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| **API health** | $FRONTEND_URL/api/health |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Primary test link:** [$FRONTEND_URL]($FRONTEND_URL)" >> $GITHUB_STEP_SUMMARY
