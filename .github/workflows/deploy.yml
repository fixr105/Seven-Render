name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Deploy to Fly.io
        run: |
          cd backend
          flyctl deploy --config fly.toml --app seven-dash --local-only --no-cache
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        timeout-minutes: 15

      - name: Verify backend deployment
        run: |
          BACKEND_URL="https://seven-dash.fly.dev"
          echo "Waiting for Fly.io machines to finish restarting..."
          sleep 15
          echo "Smoke testing backend endpoints..."
          curl -sf "$BACKEND_URL/health" | grep -q '"success":true' || (echo "Health check failed" && exit 1)
          curl -sf "$BACKEND_URL/api/test-express" | grep -q '"success":true' || (echo "test-express failed" && exit 1)
          curl -sf "$BACKEND_URL/api/nbfc-tools-ping" | grep -q '"ok":true' || (echo "nbfc-tools-ping failed" && exit 1)
          echo "All backend smoke tests passed."

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      deployment-url: ${{ steps.vercel-deploy.outputs.deployment-url }}
      preview-url: ${{ steps.vercel-deploy.outputs.preview-url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        id: vercel-deploy
        uses: amondnet/vercel-action@v25
        env:
          VERCEL_FORCE_NO_BUILD_CACHE: '1'
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --force'

  deploy-summary:
    name: Deploy Summary - Test Links
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    steps:
      - name: Post deploy test links
        run: |
          FRONTEND_URL="${{ needs.deploy-frontend.outputs.deployment-url || needs.deploy-frontend.outputs.preview-url }}"
          if [ -z "$FRONTEND_URL" ]; then
            FRONTEND_URL="https://seven-dashboard-seven.vercel.app"
          fi
          echo "## Test links (deploy complete)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | $FRONTEND_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend API** | https://seven-dash.fly.dev |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Primary test link:** [$FRONTEND_URL]($FRONTEND_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Frontend: $FRONTEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "Backend:  https://seven-dash.fly.dev"
